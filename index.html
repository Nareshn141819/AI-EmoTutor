<!DOCTYPE html>
<html>
<head>
  <title>AI Emo Tutor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 400px;
      padding: 25px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h1 {
      margin-bottom: 20px;
    }

    button {
      padding: 10px 15px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #00c853;
      color: white;
      font-size: 14px;
    }

    button:hover {
      background: #00e676;
    }

    input {
      margin-top: 10px;
    }

    .output {
      margin-top: 20px;
      text-align: left;
      background: rgba(0,0,0,0.3);
      padding: 10px;
      border-radius: 10px;
      min-height: 80px;
    }

    audio {
      margin-top: 10px;
      width: 100%;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🎙️ AI Emo Tutor</h1>

  <!-- File Upload -->
  <input type="file" id="fileInput" accept="audio/*">

  <br>

  <!-- Recording Buttons -->
  <button onclick="startRecording()">🎤 Start</button>
  <button onclick="stopRecording()">⏹ Stop</button>

  <br>

  <button onclick="sendAudio()">🚀 Analyze</button>

  <div class="output">
    <b>Response:</b>
    <p id="responseText">Waiting...</p>
  </div>

  <audio id="audioPlayer" controls></audio>

</div>

<script>

let mediaRecorder;
let audioChunks = [];
let recordedBlob = null;

// 🎤 Start Recording
async function startRecording() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable = event => {
    audioChunks.push(event.data);
  };

  mediaRecorder.onstop = () => {
    recordedBlob = new Blob(audioChunks, { type: "audio/wav" });
    audioChunks = [];
  };

  mediaRecorder.start();
  alert("Recording started");
}

// ⏹ Stop Recording
function stopRecording() {
  mediaRecorder.stop();
  alert("Recording stopped");
}

// 🚀 Send Audio (file OR recording)
const fileInput = document.getElementById("fileInput");
const responseBox = document.getElementById("responseText");
const audioPlayer = document.getElementById("audioPlayer");

async function analyzeAudio() {

    if (!fileInput.files.length) {
        alert("Please upload audio file");
        return;
    }

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);

    responseBox.innerText = "Processing...";

    try {
        const res = await fetch("https://ai-emotutor.onrender.com/analyze/", {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        console.log("API RESPONSE:", data); // 🔍 debug

        if (!data.response) {
            responseBox.innerText = "Error: No response from backend";
            return;
        }

        responseBox.innerText = data.response;

        // 🔊 Play audio
        if (data.audio) {
            audioPlayer.src = "https://ai-emotutor.onrender.com" + data.audio;
            audioPlayer.style.display = "block";
            audioPlayer.play();
        }

    } catch (err) {
        console.error("ERROR:", err);
        responseBox.innerText = "Backend connection failed";
    }
}

</script>

</body>
</html>
