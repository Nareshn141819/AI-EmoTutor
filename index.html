<!DOCTYPE html>
<html>
<head>
  <title>Emotion Detective AI Tutor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 400px;
      padding: 25px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h1 {
      margin-bottom: 20px;
    }

    button {
      padding: 10px 15px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #00c853;
      color: white;
      font-size: 14px;
    }

    button:hover {
      background: #00e676;
    }

    input {
      margin-top: 10px;
    }

    .output {
      margin-top: 20px;
      text-align: left;
      background: rgba(0,0,0,0.3);
      padding: 10px;
      border-radius: 10px;
      min-height: 80px;
    }

    audio {
      margin-top: 10px;
      width: 100%;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🎙️ Emotion Detective AI Tutor</h1>

  <!-- File Upload -->
  <input type="file" id="fileInput" accept="audio/*">

  <br>

  <!-- Recording Buttons -->
  <button onclick="startRecording()">🎤 Start</button>
  <button onclick="stopRecording()">⏹ Stop</button>

  <br>

  <button onclick="analyzeAudio()">🚀Analyze</button>

  <div class="output">
    <b>Here is your answer:
    </b>
    <p id="responseText">Wait</p>
  </div>

  <audio id="audioPlayer" controls></audio>

</div>

<script>

let mediaRecorder;
let audioChunks = [];
let recordedBlob = null;

// 🎤 Start recording
async function startRecording() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable = event => {
    audioChunks.push(event.data);
  };

  mediaRecorder.onstop = () => {
    recordedBlob = new Blob(audioChunks, { type: "audio/wav" });
    audioChunks = [];
    console.log("Recording saved");
  };

  mediaRecorder.start();
  alert("Recording started");
}

// ⏹ Stop recording
function stopRecording() {
  mediaRecorder.stop();
  alert("Recording stopped");
}

// 🚀 Send audio (file OR recording)
async function analyzeAudio() {

  const fileInput = document.getElementById("fileInput").files[0];

  let audioToSend = fileInput ? fileInput : recordedBlob;

  if (!audioToSend) {
    alert("Upload or record audio first");
    return;
  }

  const formData = new FormData();
  formData.append("file", audioToSend, "recording.wav");

  document.getElementById("responseText").innerText = "Processing...";

  try {
    const res = await fetch("https://ai-emotutor.onrender.com/analyze/", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    console.log("FULL RESPONSE:", data);

    document.getElementById("responseText").innerText = data.response;

    // 🔊 Play AI voice
    if (data.audio) {
      const audioPlayer = document.getElementById("audioPlayer");
      audioPlayer.src = "https://ai-emotutor.onrender.com" + data.audio;
      audioPlayer.style.display = "block";
      audioPlayer.play();
    }

  } catch (err) {
    console.error("ERROR:", err);
    alert("Backend error");
  }
}
</script>

</body>
</html>
